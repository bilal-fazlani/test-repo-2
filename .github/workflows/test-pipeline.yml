name: Test Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment name"
        required: true
        type: choice
        options:
          - dev
          - tst
          - stg
          - prd
      notes:
        description: "Additional notes"
        required: false
        type: string

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - name: Print inputs
        run: |
          echo "Environment: ${{ inputs.environment }}"
          echo "Notes: ${{ inputs.notes }}"
      - name: Initialize
        run: sleep 5

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Build frontend artifacts
        run: |
          echo "Building frontend for ${{ inputs.environment }}"
          sleep 10

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Build backend artifacts
        run: |
          echo "Building backend for ${{ inputs.environment }}"
          if [ "${{ inputs.notes }}" = "FAIL" ]; then
            echo "::error::Simulated backend build failure"
            exit 1
          fi
          sleep 10

  run-linting:
    name: Run Linting
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Lint codebase
        run: |
          echo "Linting code for ${{ inputs.environment }}"
          sleep 5

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend, run-linting]
    steps:
      - name: Deploy to environment
        run: |
          echo "Deploying to ${{ inputs.environment }}"
          sleep 10

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Run smoke tests
        run: |
          echo "Running smoke tests on ${{ inputs.environment }}"
          sleep 5

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - name: Send notification
        run: |
          echo "Pipeline complete for ${{ inputs.environment }}"
          echo "Notes: ${{ inputs.notes }}"
          sleep 5
